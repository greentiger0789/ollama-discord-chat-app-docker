name: Trivy

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build discord-bot image
        run: docker build -t discord-bot:scan ./discord-bot

      # Image scan: report vulnerabilities as informational (does not fail CI).
      # Results are uploaded to GitHub Security tab for review.
      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: discord-bot:scan
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy filesystem scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
