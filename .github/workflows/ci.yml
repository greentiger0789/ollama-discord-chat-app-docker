name: CI

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: 24
  ACTIONLINT_VERSION: 1.7.12
  HADOLINT_VERSION: 2.14.0

jobs:
  test:
    name: Test (Node.js 24)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./discord-bot

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./discord-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  actionlint:
    name: GitHub Actions Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: docker run --rm -v "${{ github.workspace }}:/repo" -w /repo rhysd/actionlint:${{ env.ACTIONLINT_VERSION }}

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lint root Dockerfile
        run: docker run --rm -v "${{ github.workspace }}:/repo" -w /repo hadolint/hadolint:v${{ env.HADOLINT_VERSION }} hadolint /repo/Dockerfile

      - name: Lint discord-bot Dockerfile
        run: docker run --rm -v "${{ github.workspace }}:/repo" -w /repo hadolint/hadolint:v${{ env.HADOLINT_VERSION }} hadolint /repo/discord-bot/Dockerfile

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs:
      - test
      - actionlint
      - hadolint

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build discord-bot image
        uses: docker/build-push-action@v7
        with:
          context: ./discord-bot
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
