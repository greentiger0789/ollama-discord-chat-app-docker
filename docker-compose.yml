services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ./ollama-data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: /bin/sh
    command: /ollama-entrypoint.sh
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 5s

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    profiles:
      - webui
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "3000:8080"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"

  discord-bot:
    build:
      context: ./discord-bot
    container_name: discord-bot
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./discord-bot/logs:/app/logs
      - ./discord-bot/config:/app/config:ro
